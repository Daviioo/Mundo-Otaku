<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo Otaku</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #11141d;
            --accent: #00d2ff;
            --text: #ffffff;
            --sub: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; overflow-x: hidden;
            background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text);
        }

        header { padding: 50px 20px 20px; text-align: center; }
        h1 { font-size: 2.2rem; font-weight: 800; margin: 0 auto 10px; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--sub); font-size: 1rem; margin: 10px auto 5px; }
        .instruction { color: var(--accent); font-size: 0.85rem; opacity: 0.8; display: block; margin: 5px auto 0; text-align: center; }

        .search-wrapper { display: flex; justify-content: center; padding: 0 20px; margin: 30px 0; }
        .search-bar { width: 100%; max-width: 500px; display: flex; gap: 10px; }
        .search-bar input { flex: 1; background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 20px; border-radius: 15px; color: white; text-align: center; outline: none; }
        .search-btn { background: var(--accent); border: none; border-radius: 15px; padding: 0 20px; font-weight: bold; color: #000; }

        .tabs-wrapper { display: flex; justify-content: center; margin-bottom: 40px; position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 10px 0; }
        .tabs-nav { background: #161b22; padding: 4px; border-radius: 50px; display: flex; width: 260px; position: relative; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: 700; font-size: 0.85rem; color: var(--sub); z-index: 2; }
        .tab-btn.active { color: #000; }
        .glider { position: absolute; height: calc(100% - 8px); width: calc(50% - 4px); background: var(--accent); border-radius: 50px; top: 4px; left: 4px; transition: 0.4s; z-index: 1; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .img-container { width: 100%; aspect-ratio: 2/3; overflow: hidden; background: #000; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; }
        .card-title { font-size: 0.9rem; font-weight: 700; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-tag { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; }
        #loading { text-align: center; width: 100%; color: var(--sub); padding: 20px; }
    </style>
</head>
<body>

<header>
    <h1>Mundo Otaku</h1>
    <p>Explore o universo dos animes e mangás</p>
    <span class="instruction">Se você não achar o que está procurando, use a barra de pesquisa para achar</span>
</header>

<div class="search-wrapper">
    <div class="search-bar">
        <input type="text" id="search" placeholder="Buscar..." oninput="executarBusca()" onkeypress="if(event.key==='Enter')forçarBusca()">
        <button class="search-btn" onclick="forçarBusca()">OK</button>
    </div>
</div>

<div class="tabs-wrapper">
    <div class="tabs-nav">
        <div class="tab-btn active" id="btn-anime" onclick="setTipo('anime', this)">Animes</div>
        <div class="tab-btn" id="btn-manga" onclick="setTipo('manga', this)">Mangás</div>
        <div class="glider" id="glider"></div>
    </div>
</div>

<div class="container">
    <div id="loading">Carregando...</div>
    <div class="grid" id="main-grid"></div>
</div>

<script>
    let tipoAtual = 'anime';
    let timeout;

    function setTipo(tipo, el) {
        if (tipoAtual === tipo) return;
        tipoAtual = tipo;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('glider').style.transform = tipo === 'manga' ? 'translateX(100%)' : 'translateX(0)';
        executarBusca();
    }

    function forçarBusca() {
        document.getElementById('search').blur();
        executarBusca();
    }

    async function executarBusca() {
        const query = document.getElementById('search').value;
        const grid = document.getElementById('main-grid');
        const loading = document.getElementById('loading');
        clearTimeout(timeout);
        timeout = setTimeout(async () => {
            try {
                const url = query.length > 2 
                    ? `https://api.jikan.moe/v4/${tipoAtual}?q=${query}&order_by=popularity`
                    : `https://api.jikan.moe/v4/top/${tipoAtual}`;
                const res = await fetch(url);
                const data = await res.json();
                loading.style.display = "none";
                grid.innerHTML = "";
                data.data.slice(0, 20).forEach(item => {
                    const card = document.createElement('a');
                    const searchName = encodeURIComponent(item.title);
                    card.href = (tipoAtual === 'anime') 
                        ? `https://www.crunchyroll.com/search?q=${searchName}`
                        : `https://mangadex.org/search?q=${searchName}`;
                    card.target = "_self"; // Abre dentro do app
                    card.className = "card";
                    card.innerHTML = `
                        <div class="img-container"><img src="${item.images.jpg.large_image_url}" loading="lazy"></div>
                        <div class="card-info">
                            <span class="card-tag">${item.type || tipoAtual}</span>
                            <div class="card-title">${item.title}</div>
                        </div>`;
                    grid.appendChild(card);
                });
            } catch (e) { loading.innerText = "Erro ao carregar."; }
        }, 300);
    }
    window.onload = executarBusca;
</script>
</body>
</html>
