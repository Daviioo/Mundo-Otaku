<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo Otaku</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #11141d;
            --accent: #00d2ff;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); }

        /* LISTA DE CAPAS */
        #home-screen { width: 100%; height: 100%; overflow-y: auto; display: block; }
        header { padding: 40px 20px 20px; text-align: center; }
        h1 { font-size: 2.2rem; font-weight: 800; margin: 0; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-wrapper { display: flex; justify-content: center; padding: 0 20px; margin: 20px 0; }
        .search-bar input { width: 100%; max-width: 500px; background: var(--card-bg); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; color: white; text-align: center; outline: none; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px 50px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; font-size: 0.85rem; font-weight: 700; }

        /* BOTÃO VOLTAR FLUTUANTE (O SEGREDO) */
        #btn-flutuante-voltar {
            display: none; /* Só aparece quando abrir o site */
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999999; /* Fica acima de TUDO */
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 900;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            cursor: pointer;
        }

        /* O PLAYER/SITE */
        #viewer-frame {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 999999;
            background: #000;
            border: none;
        }
    </style>
</head>
<body>

<button id="btn-flutuante-voltar" onclick="fecharSite()">← VOLTAR</button>

<div id="home-screen">
    <header><h1>Mundo Otaku</h1></header>
    <div class="search-wrapper">
        <input type="text" id="search" placeholder="Buscar Anime ou Mangá..." oninput="executarBusca()">
    </div>
    <div class="container"><div id="main-grid" class="grid"></div></div>
</div>

<iframe id="viewer-frame" src=""></iframe>

<script>
    function abrirSite(nome) {
        const query = encodeURIComponent(nome);
        // Usando o Google Search como intermediário ou o link direto
        // Muitos sites bloqueiam IFRAME, vamos tentar o DuckDuckGo Search que é mais aberto
        let urlFinal = `https://www.crunchyroll.com/search?q=${query}`;
        
        const frame = document.getElementById('viewer-frame');
        const btn = document.getElementById('btn-flutuante-voltar');
        
        frame.src = urlFinal;
        frame.style.display = 'block';
        btn.style.display = 'block';
    }

    function fecharSite() {
        const frame = document.getElementById('viewer-frame');
        const btn = document.getElementById('btn-flutuante-voltar');
        
        frame.src = "";
        frame.style.display = 'none';
        btn.style.display = 'none';
    }

    async function executarBusca() {
        const query = document.getElementById('search').value;
        const grid = document.getElementById('main-grid');
        const url = query.length > 2 
            ? `https://api.jikan.moe/v4/anime?q=${query}`
            : `https://api.jikan.moe/v4/top/anime`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            grid.innerHTML = "";
            data.data.slice(0, 20).forEach(item => {
                const card = document.createElement('div');
                card.className = "card";
                card.onclick = () => abrirSite(item.title);
                card.innerHTML = `<img src="${item.images.jpg.large_image_url}"><div class="card-info">${item.title}</div>`;
                grid.appendChild(card);
            });
        } catch (e) {}
    }
    window.onload = executarBusca;
</script>
</body>
</html>
