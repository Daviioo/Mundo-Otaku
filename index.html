<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo Otaku</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #11141d;
            --accent: #00d2ff;
            --text: #ffffff;
            --sub: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); overflow: hidden; height: 100%; width: 100%; }

        /* LISTA INICIAL */
        #home-screen { width: 100%; height: 100%; overflow-y: auto; display: block; }
        header { padding: 40px 20px 20px; text-align: center; }
        h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-bar { padding: 0 20px; margin-bottom: 20px; text-align: center; }
        .search-bar input { width: 100%; max-width: 500px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; color: white; outline: none; }
        
        .tabs-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        .tabs-nav { background: #161b22; padding: 4px; border-radius: 50px; display: flex; width: 240px; position: relative; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-weight: 700; font-size: 0.85rem; color: var(--sub); z-index: 2; cursor: pointer; }
        .tab-btn.active { color: #000; }
        .glider { position: absolute; height: calc(100% - 8px); width: calc(50% - 4px); background: var(--accent); border-radius: 50px; top: 4px; left: 4px; transition: 0.4s; z-index: 1; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px; padding-bottom: 40px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-title { padding: 10px; text-align: center; font-size: 0.8rem; font-weight: 700; }

        /* PLAYER DE SITES */
        #viewer-container { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 999999; 
            background: #000; 
        }

        /* O BOTÃO AZUL (SÓ PARA MANGÁ) */
        #btn-voltar-manga { 
            position: absolute; 
            top: 20px; left: 20px; 
            z-index: 1000001; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 12px; 
            font-weight: 800; 
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #viewer-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<button id="btn-voltar-manga" onclick="fecharSite()">← VOLTAR</button>

<div id="home-screen">
    <header><h1>Mundo Otaku</h1></header>
    <div class="search-bar"><input type="text" id="search" placeholder="Buscar..." oninput="executarBusca()"></div>
    
    <div class="tabs-wrapper">
        <div class="tabs-nav">
            <div class="tab-btn active" onclick="setTipo('anime', this)">Animes</div>
            <div class="tab-btn" onclick="setTipo('manga', this)">Mangás</div>
            <div class="glider" id="glider"></div>
        </div>
    </div>

    <div class="grid" id="main-grid"></div>
</div>

<div id="viewer-container">
    <iframe id="viewer-frame" src=""></iframe>
</div>

<script>
    let tipoAtual = 'anime';
    let timeout;

    function setTipo(tipo, el) {
        tipoAtual = tipo;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('glider').style.transform = tipo === 'manga' ? 'translateX(100%)' : 'translateX(0)';
        executarBusca();
    }

    function abrirSite(nome) {
        const query = encodeURIComponent(nome);
        // Crunchyroll às vezes bloqueia iframe. Se der tela preta, tentaremos um link de busca mobile.
        const url = (tipoAtual === 'anime') 
            ? `https://www.crunchyroll.com/search?q=${query}`
            : `https://mangadex.org/search?q=${query}`;
        
        const container = document.getElementById('viewer-container');
        const frame = document.getElementById('viewer-frame');
        const btn = document.getElementById('btn-voltar-manga');

        // Mostra o botão azul APENAS se for mangá
        btn.style.display = (tipoAtual === 'manga') ? 'block' : 'none';
        
        frame.src = url;
        container.style.display = 'block';
        document.getElementById('home-screen').style.display = 'none';

        // Para animes, como não tem botão, avisamos o usuário (opcional)
        if(tipoAtual === 'anime') {
            console.log("Use o gesto de voltar do celular para sair do anime.");
        }
    }

    function fecharSite() {
        document.getElementById('viewer-frame').src = "";
        document.getElementById('viewer-container').style.display = 'none';
        document.getElementById('btn-voltar-manga').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }

    // INTERCEPTAR O BOTÃO VOLTAR DO ANDROID (MOTOROLA)
    // Isso evita que o app feche!
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() {
        const container = document.getElementById('viewer-container');
        if (container.style.display === 'block') {
            fecharSite();
            window.history.pushState(null, null, window.location.href);
        }
    };

    async function executarBusca() {
        const query = document.getElementById('search').value;
        const grid = document.getElementById('main-grid');
        const url = query.length > 2 
            ? `https://api.jikan.moe/v4/${tipoAtual}?q=${query}`
            : `https://api.jikan.moe/v4/top/${tipoAtual}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            grid.innerHTML = "";
            data.data.slice(0, 24).forEach(item => {
                const card = document.createElement('div');
                card.className = "card";
                card.onclick = () => abrirSite(item.title);
                card.innerHTML = `<img src="${item.images.jpg.large_image_url}"><div class="card-title">${item.title}</div>`;
                grid.appendChild(card);
            });
        } catch (e) {}
    }
    window.onload = executarBusca;
</script>
</body>
</html>
