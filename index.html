<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo Otaku</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #11141d;
            --accent: #00d2ff;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }

        /* TELA INICIAL */
        #home-screen { width: 100%; height: 100%; overflow-y: auto; display: block; padding-bottom: 30px; }
        header { padding: 40px 20px; text-align: center; }
        h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-bar { padding: 0 20px; margin-bottom: 20px; text-align: center; }
        .search-bar input { width: 100%; max-width: 500px; background: var(--card-bg); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; color: white; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-title { padding: 10px; text-align: center; font-size: 0.8rem; font-weight: 700; }

        /* AREA DO PLAYER (O SEGREDO ESTÁ AQUI) */
        #viewer-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10000;
            background: #000;
        }

        /* BARRA SUPERIOR FIXA QUE NUNCA SOME */
        .top-nav {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 60px;
            background: rgba(17, 20, 29, 0.9);
            display: flex;
            align-items: center;
            padding: 0 15px;
            z-index: 20000; /* Z-INDEX ALTÍSSIMO */
            border-bottom: 1px solid var(--accent);
        }

        .btn-voltar {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.8rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* O SITE CARREGA ABAIXO DA BARRA */
        #viewer-frame {
            position: absolute;
            top: 60px; /* Começa depois da barra azul */
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            border: none;
        }
    </style>
</head>
<body>

<div id="home-screen">
    <header><h1>Mundo Otaku</h1></header>
    <div class="search-bar"><input type="text" id="search" placeholder="Buscar no Mundo Otaku..." oninput="executarBusca()"></div>
    <div class="grid" id="main-grid"></div>
</div>

<div id="viewer-container">
    <div class="top-nav">
        <button class="btn-voltar" onclick="fecharViewer()">← VOLTAR</button>
        <span style="margin-left: 15px; font-weight: 800; font-size: 0.9rem; color: var(--accent);">Mundo Otaku</span>
    </div>
    <iframe id="viewer-frame" src=""></iframe>
</div>

<script>
    function abrirViewer(nome) {
        const query = encodeURIComponent(nome);
        // Usamos um buscador para evitar o bloqueio direto de iframe de alguns sites
        const url = `https://www.crunchyroll.com/search?q=${query}`;
        
        document.getElementById('viewer-frame').src = url;
        document.getElementById('viewer-container').style.display = 'block';
        document.getElementById('home-screen').style.display = 'none';
    }

    function fecharViewer() {
        document.getElementById('viewer-frame').src = "";
        document.getElementById('viewer-container').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }

    async function executarBusca() {
        const query = document.getElementById('search').value;
        const grid = document.getElementById('main-grid');
        const url = query.length > 2 
            ? `https://api.jikan.moe/v4/anime?q=${query}`
            : `https://api.jikan.moe/v4/top/anime`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            grid.innerHTML = "";
            data.data.slice(0, 20).forEach(item => {
                const card = document.createElement('div');
                card.className = "card";
                card.onclick = () => abrirViewer(item.title);
                card.innerHTML = `<img src="${item.images.jpg.large_image_url}"><div class="card-title">${item.title}</div>`;
                grid.appendChild(card);
            });
        } catch (e) {}
    }
    window.onload = executarBusca;
</script>
</body>
</html>
